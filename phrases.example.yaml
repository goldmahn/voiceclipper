# Target phrases for Voiceclipper v1.
# Each entry becomes one output clip when a match is found in the recording.
#
# id:         stable filename stem for the exported clip
# text:       phrase to search for (case-insensitive substring match)
# padding_ms: extra audio before/after the matched segment

phrases:
  - id: who_sent_you
    text: "Who sent you?"
    padding_ms: 250

  - id: dont_like_this_place
    text: "I don't like this place."
    padding_ms: 250

  - id: youre_late
    text: "You're late."
    padding_ms: 250

  - id: close_the_door
    text: "Close the door behind you."
    padding_ms: 250

  - id: waiting_for_hours
    text: "We've been waiting for hours."
    padding_ms: 250

  - id: what_do_you_want
    text: "What do you want from me?"
    padding_ms: 250

  - id: didnt_expect_company
    text: "I didn't expect company tonight."
    padding_ms: 250

  - id: sit_down
    text: "You should sit down."
    padding_ms: 250

  - id: heard_that_before
    text: "I've heard that before."
    padding_ms: 250

  - id: keep_voice_down
    text: "Keep your voice down."
    padding_ms: 250
